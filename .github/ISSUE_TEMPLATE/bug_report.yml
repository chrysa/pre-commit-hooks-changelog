name: Bug Report
description: Report a bug or unexpected behaviour
title: "[Bug] "
labels: ["bug"]
body:
    -   type: markdown
        attributes:
            value: |
                Thank you for reporting this bug. Please fill in the form below as precisely as possible.

    -   type: textarea
        id: description
        attributes:
            label: Bug description
            description: A clear and concise description of the bug.
            placeholder: Describe the problem...
        validations:
            required: true

    -   type: textarea
        id: reproduction
        attributes:
            label: Steps to reproduce
            description: Steps that allow reproducing the behaviour.
            placeholder: |
                1. Configure `.pre-commit-config.yaml` with...
                2. Run `pre-commit run ...`
                3. Observe the error...
        validations:
            required: true

    -   type: textarea
        id: expected
        attributes:
            label: Expected behaviour
            description: What should happen.
        validations:
            required: true

    -   type: textarea
        id: actual
        attributes:
            label: Actual behaviour
            description: What actually happens. Include error messages or logs.
            render: shell
        validations:
            required: true

    -   type: input
        id: version
        attributes:
            label: pre-commit-hooks-changelog version
            placeholder: e.g. v0.2.0
        validations:
            required: true

    -   type: input
        id: python
        attributes:
            label: Python version
            placeholder: e.g. 3.13.0
        validations:
            required: true

    -   type: input
        id: precommit
        attributes:
            label: pre-commit version
            placeholder: e.g. 3.7.1
        validations:
            required: false

    -   type: textarea
        id: config
        attributes:
            label: .pre-commit-config.yaml configuration
            description: The section of your config using this hook.
            render: yaml
        validations:
            required: false

    -   type: textarea
        id: context
        attributes:
            label: Additional context
            description: Any other useful information (OS, environment, etc.).
        validations:
            required: false
