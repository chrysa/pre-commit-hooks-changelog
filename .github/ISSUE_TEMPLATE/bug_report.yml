name: Bug Report
description: Signaler un bug ou un comportement inattendu
title: "[Bug] "
labels: ["bug"]
body:
    -   type: markdown
        attributes:
            value: |
                Merci de signaler ce bug. Veuillez remplir le formulaire ci-dessous aussi précisément que possible.

    -   type: textarea
        id: description
        attributes:
            label: Description du bug
            description: Une description claire et concise du bug.
            placeholder: Décrivez le problème...
        validations:
            required: true

    -   type: textarea
        id: reproduction
        attributes:
            label: Étapes pour reproduire
            description: Les étapes qui permettent de reproduire le comportement.
            placeholder: |
                1. Configurer `.pre-commit-config.yaml` avec...
                2. Lancer `pre-commit run ...`
                3. Observer l'erreur...
        validations:
            required: true

    -   type: textarea
        id: expected
        attributes:
            label: Comportement attendu
            description: Ce qui devrait se passer.
        validations:
            required: true

    -   type: textarea
        id: actual
        attributes:
            label: Comportement observé
            description: Ce qui se passe réellement. Incluez les messages d'erreur ou logs.
            render: shell
        validations:
            required: true

    -   type: input
        id: version
        attributes:
            label: Version de pre-commit-hooks-changelog
            placeholder: ex. v0.2.0
        validations:
            required: true

    -   type: input
        id: python
        attributes:
            label: Version Python
            placeholder: ex. 3.13.0
        validations:
            required: true

    -   type: input
        id: precommit
        attributes:
            label: Version pre-commit
            placeholder: ex. 3.7.1
        validations:
            required: false

    -   type: textarea
        id: config
        attributes:
            label: Configuration .pre-commit-config.yaml
            description: La section de votre config utilisant ce hook.
            render: yaml
        validations:
            required: false

    -   type: textarea
        id: context
        attributes:
            label: Contexte additionnel
            description: Tout autre élément utile (OS, environment, etc.).
        validations:
            required: false
