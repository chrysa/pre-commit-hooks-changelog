name: Feature Request
description: Proposer une amélioration ou une nouvelle fonctionnalité
title: "[Feature] "
labels: ["enhancement"]
body:
    -   type: markdown
        attributes:
            value: |
                Merci de proposer une amélioration. Décrivez votre besoin aussi clairement que possible.

    -   type: textarea
        id: problem
        attributes:
            label: Problème ou besoin
            description: Quel problème cette fonctionnalité résoudrait-elle ?
            placeholder: Je trouve frustrant de ne pas pouvoir...
        validations:
            required: true

    -   type: textarea
        id: solution
        attributes:
            label: Solution proposée
            description: Décrivez la solution que vous imaginez.
        validations:
            required: true

    -   type: textarea
        id: alternatives
        attributes:
            label: Alternatives envisagées
            description: Avez-vous envisagé d'autres approches ?
        validations:
            required: false

    -   type: textarea
        id: usecase
        attributes:
            label: Cas d'usage
            description: Décrivez le cas d'usage concret.
            placeholder: |
                Dans un projet avec plusieurs équipes, il serait utile de...
        validations:
            required: false

    -   type: textarea
        id: context
        attributes:
            label: Contexte additionnel
            description: Tout autre élément (screenshots, liens, références).
        validations:
            required: false
