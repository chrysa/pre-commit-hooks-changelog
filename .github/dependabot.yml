version: 2

updates:
    # ── GitHub Actions ─────────────────────────────────────────────────────────
    -   package-ecosystem: github-actions
        directory: /
        schedule:
            interval: weekly
            day: monday
            time: "09:00"
            timezone: Europe/Paris
        labels:
            - dependencies
            - github-actions
        commit-message:
            prefix: "ci"
        groups:
            github-actions:
                patterns:
                    - "*"

    # ── pip / Python ───────────────────────────────────────────────────────────
    -   package-ecosystem: pip
        directory: /
        schedule:
            interval: weekly
            day: monday
            time: "09:00"
            timezone: Europe/Paris
        labels:
            - dependencies
            - python
        commit-message:
            prefix: "chore"
        groups:
            python-deps:
                patterns:
                    - "*"

    # ── pre-commit hooks ───────────────────────────────────────────────────────
    -   package-ecosystem: "pre-commit"
        directory: /
        schedule:
            interval: weekly
            day: monday
            time: "09:00"
            timezone: Europe/Paris
        labels:
            - dependencies
            - pre-commit
        commit-message:
            prefix: "chore"
