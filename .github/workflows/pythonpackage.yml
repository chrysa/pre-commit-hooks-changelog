name: Python package

on:
    push:
        branches: [master, develop]
    pull_request:
        branches: [master, develop]

jobs:
    tests:
        name: Tests (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

        steps:
            -   uses: actions/checkout@v6

            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v5
                with:
                    python-version: ${{ matrix.python-version }}
                    allow-prereleases: true
                    cache: pip

            -   name: Install dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install -e ".[tests]"

            -   name: Run tests with coverage
                run: |
                    pytest --cov=pre_commit_hook --cov-report=xml --cov-report=term-missing tests/

            -   name: Upload coverage report
                uses: actions/upload-artifact@v4
                if: matrix.python-version == '3.14'
                with:
                    name: coverage-report
                    path: coverage.xml

    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v6

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: "3.14"
                    allow-prereleases: true
                    cache: pip

            -   name: Install lint dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install -e ".[flake8,mypy,pylint]"

            -   name: Run flake8
                run: flake8 --config=./setup.cfg ./pre_commit_hook

            -   name: Run mypy
                run: mypy --config-file=./setup.cfg pre_commit_hook/
                continue-on-error: true

    deploy-test:
        name: Deploy to TestPyPI
        needs: [tests, lint]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

        steps:
            -   uses: actions/checkout@v6

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: "3.14"
                    allow-prereleases: true
                    cache: pip

            -   name: Install build dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install build twine

            -   name: Build package
                run: python -m build

            -   name: Publish to TestPyPI
                env:
                    TWINE_USERNAME: ${{ secrets.pypi_test_username }}
                    TWINE_PASSWORD: ${{ secrets.pypi_test_password }}
                run: twine upload --repository-url https://test.pypi.org/legacy/ dist/*

    deploy-stable:
        name: Deploy to PyPI
        needs: [tests, lint]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'

        steps:
            -   uses: actions/checkout@v6

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: "3.14"
                    allow-prereleases: true
                    cache: pip

            -   name: Install build dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install build twine

            -   name: Build package
                run: python -m build

            -   name: Publish to PyPI
                env:
                    TWINE_USERNAME: ${{ secrets.pypi_username }}
                    TWINE_PASSWORD: ${{ secrets.pypi_password }}
                run: twine upload dist/*
