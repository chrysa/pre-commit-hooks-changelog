---
name: CI

on:
    push:
        branches:
            - master
            - develop
            - "feature/**"
            - "hotfix/**"
            - "release/**"
    pull_request:
        branches:
            - master
            - develop

# Required for publish-unit-test-result-action and SonarCloud
permissions:
    checks: write
    contents: read
    pull-requests: write
    statuses: write

jobs:
    # ── Versioning ─────────────────────────────────────────────────────────────
    versioning:
        name: GitVersion
        runs-on: ubuntu-latest
        outputs:
            semver: ${{ steps.gv.outputs.semVer }}
            full-semver: ${{ steps.gv.outputs.fullSemVer }}
        steps:
            -   uses: actions/checkout@v6
                with:
                    fetch-depth: 0

            -   id: gv
                uses: chrysa/github-actions/gitversion@v1.0.1

            -   name: Display version
                run: |
                    echo "SemVer    : ${{ steps.gv.outputs.semVer }}"
                    echo "FullSemVer: ${{ steps.gv.outputs.fullSemVer }}"
                shell: bash

    # ── Tests ──────────────────────────────────────────────────────────────────
    tests:
        name: Tests (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        needs: versioning
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        steps:
            -   uses: actions/checkout@v6

            -   uses: chrysa/github-actions/tool-setup@v1.0.1
                with:
                    python-version: ${{ matrix.python-version }}
                    extras: tests

            -   uses: chrysa/github-actions/run-tests@v1.0.1
                with:
                    python-version: ${{ matrix.python-version }}
                    latest-python: "3.14"
                    cov-module: pre_commit_hook

    # ── Lint ───────────────────────────────────────────────────────────────────
    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: versioning
        steps:
            -   uses: actions/checkout@v6

            -   uses: chrysa/github-actions/tool-setup@v1.0.1
                with:
                    python-version: "3.13"
                    extras: ruff,mypy

            -   uses: chrysa/github-actions/ruff-check@v1.0.1
                with:
                    python-version: "3.13"
                    latest-python: "3.13"
                    config: pyproject.toml
                    sources: pre_commit_hook

            -   uses: chrysa/github-actions/mypy-check@v1.0.1
                with:
                    python-version: "3.13"
                    latest-python: "3.13"
                    config-file: setup.cfg
                    sources: pre_commit_hook/

    # ── Pre-commit ─────────────────────────────────────────────────────────────
    pre-commit:
        name: Pre-commit
        runs-on: ubuntu-latest
        needs: versioning
        steps:
            -   uses: actions/checkout@v6

            -   uses: actions/setup-python@v6
                with:
                    python-version: "3.13"

            -   uses: pre-commit/action@v3.0.1
                env:
                    SKIP: generate-changelog,env-file-check,requirements-sort

    # ── SonarCloud ─────────────────────────────────────────────────────────────
    sonar:
        name: SonarCloud analysis
        needs: [lint, tests]
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v6
                with:
                    fetch-depth: 0

            -   uses: chrysa/github-actions/sonar-scan@v1.0.1
                with:
                    latest-python: "3.14"
                    sonar-token: ${{ secrets.SONAR_TOKEN }}
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    project-key: chrysa_pre-commit-hooks-changelog
                    organization: chrysa
                    project-name: pre-commit-hooks-changelog
                    sources: pre_commit_hook
                    tests: tests

    # ── Deploy TestPyPI ────────────────────────────────────────────────────────
    deploy-test:
        name: Deploy to TestPyPI
        needs: [versioning, tests, lint]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        steps:
            -   uses: actions/checkout@v6

            -   uses: chrysa/github-actions/tool-setup@v1.0.1
                with:
                    python-version: "3.13"
                    extras: pypi

            -   name: Set version in setup.cfg
                run: |
                    sed -i "s/^version = .*/version = ${{ needs.versioning.outputs.semver }}/" setup.cfg
                shell: bash

            -   name: Build package
                run: python -m build
                shell: bash

            -   name: Publish to TestPyPI
                run: twine upload --repository-url https://test.pypi.org/legacy/ dist/*
                shell: bash
                env:
                    TWINE_USERNAME: ${{ secrets.PYPI_TEST_USERNAME }}
                    TWINE_PASSWORD: ${{ secrets.PYPI_TEST_PASSWORD }}

    # ── Deploy PyPI ────────────────────────────────────────────────────────────
    deploy-stable:
        name: Deploy to PyPI
        needs: [versioning, tests, lint]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        steps:
            -   uses: actions/checkout@v6

            -   uses: chrysa/github-actions/tool-setup@v1.0.1
                with:
                    python-version: "3.13"
                    extras: pypi

            -   name: Set version in setup.cfg
                run: |
                    sed -i "s/^version = .*/version = ${{ needs.versioning.outputs.semver }}/" setup.cfg
                shell: bash

            -   name: Build package
                run: python -m build
                shell: bash

            -   name: Publish to PyPI
                run: twine upload dist/*
                shell: bash
                env:
                    TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
                    TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}

            -   name: Create GitHub Release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: v${{ needs.versioning.outputs.semver }}
                    name: v${{ needs.versioning.outputs.semver }}
                    generate_release_notes: true
                    files: dist/*
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
