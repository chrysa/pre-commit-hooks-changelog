name: CI

on:
    push:
        branches:
            - master
            - develop
            - "feature/**"
            - "hotfix/**"
            - "release/**"
    pull_request:
        branches:
            - master
            - develop

jobs:
    # ── Versioning ─────────────────────────────────────────────────────────────
    versioning:
        name: GitVersion
        runs-on: ubuntu-latest
        outputs:
            semver: ${{ steps.gitversion.outputs.semVer }}
            major: ${{ steps.gitversion.outputs.major }}
            minor: ${{ steps.gitversion.outputs.minor }}
            patch: ${{ steps.gitversion.outputs.patch }}
            pre-release-tag: ${{ steps.gitversion.outputs.preReleaseTag }}
            informational-version: ${{ steps.gitversion.outputs.informationalVersion }}
        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Setup GitVersion
                uses: gittools/actions/gitversion/setup@v3
                with:
                    versionSpec: '6.x'

            -   name: Determine version
                id: gitversion
                uses: gittools/actions/gitversion/execute@v3
                with:
                    useConfigFile: true
                    configFilePath: GitVersion.yml

            -   name: Display version
                run: |
                    echo "SemVer       : ${{ steps.gitversion.outputs.semVer }}"
                    echo "Informational: ${{ steps.gitversion.outputs.informationalVersion }}"

    # ── Tests ──────────────────────────────────────────────────────────────────
    tests:
        name: Tests (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        needs: versioning
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        steps:
            -   uses: actions/checkout@v4

            -   name: Set up Python ${{ matrix.python-version }}
                uses: actions/setup-python@v5
                with:
                    python-version: ${{ matrix.python-version }}
                    allow-prereleases: true
                    cache: pip

            -   name: Install dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install -e ".[tests]"

            -   name: Run tests with coverage
                run: pytest --cov=pre_commit_hook --cov-report=xml --cov-report=term-missing tests/

            -   name: Upload coverage report
                uses: actions/upload-artifact@v4
                if: matrix.python-version == '3.14'
                with:
                    name: coverage-report
                    path: coverage.xml

    # ── Lint ───────────────────────────────────────────────────────────────────
    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: versioning
        steps:
            -   uses: actions/checkout@v4

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: "3.13"
                    cache: pip

            -   name: Install lint dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install -e ".[flake8,mypy,pylint]"

            -   name: Run flake8
                run: flake8 --config=./setup.cfg ./pre_commit_hook

            -   name: Run mypy
                run: mypy --config-file=./setup.cfg pre_commit_hook/
                continue-on-error: true

    # ── Pre-commit ─────────────────────────────────────────────────────────────
    pre-commit:
        name: Pre-commit
        runs-on: ubuntu-latest
        needs: versioning
        steps:
            -   uses: actions/checkout@v4

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: "3.13"
                    cache: pip

            -   name: Install pre-commit
                run: pip install pre-commit

            -   name: Run pre-commit
                run: pre-commit run --all-files --show-diff-on-failure
                env:
                    SKIP: generate-changelog

    # ── Deploy TestPyPI ────────────────────────────────────────────────────────
    deploy-test:
        name: Deploy to TestPyPI
        needs: [tests, lint]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Setup GitVersion
                uses: gittools/actions/gitversion/setup@v3
                with:
                    versionSpec: '6.x'

            -   name: Determine version
                id: gitversion
                uses: gittools/actions/gitversion/execute@v3
                with:
                    useConfigFile: true
                    configFilePath: GitVersion.yml

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: "3.13"
                    cache: pip

            -   name: Install build dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install build twine

            -   name: Set version in setup.cfg
                run: |
                    sed -i "s/^version = .*/version = ${{ steps.gitversion.outputs.semVer }}/" setup.cfg

            -   name: Build package
                run: python -m build

            -   name: Publish to TestPyPI
                env:
                    TWINE_USERNAME: ${{ secrets.PYPI_TEST_USERNAME }}
                    TWINE_PASSWORD: ${{ secrets.PYPI_TEST_PASSWORD }}
                run: twine upload --repository-url https://test.pypi.org/legacy/ dist/*

    # ── Deploy PyPI ────────────────────────────────────────────────────────────
    deploy-stable:
        name: Deploy to PyPI
        needs: [tests, lint]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        steps:
            -   uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Setup GitVersion
                uses: gittools/actions/gitversion/setup@v3
                with:
                    versionSpec: '6.x'

            -   name: Determine version
                id: gitversion
                uses: gittools/actions/gitversion/execute@v3
                with:
                    useConfigFile: true
                    configFilePath: GitVersion.yml

            -   name: Set up Python
                uses: actions/setup-python@v5
                with:
                    python-version: "3.13"
                    cache: pip

            -   name: Install build dependencies
                run: |
                    python -m pip install --upgrade pip
                    pip install build twine

            -   name: Set version in setup.cfg
                run: |
                    sed -i "s/^version = .*/version = ${{ steps.gitversion.outputs.semVer }}/" setup.cfg

            -   name: Build package
                run: python -m build

            -   name: Publish to PyPI
                env:
                    TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
                    TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
                run: twine upload dist/*

            -   name: Create GitHub Release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: v${{ steps.gitversion.outputs.semVer }}
                    name: v${{ steps.gitversion.outputs.semVer }}
                    generate_release_notes: true
                    files: dist/*
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
