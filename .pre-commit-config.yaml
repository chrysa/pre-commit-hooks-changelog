default_language_version:
    python: python3.13
fail_fast: false
minimum_pre_commit_version: 3.7.1

repos:
    # ── Changelog ──────────────────────────────────────────────────────────────
    -   repo: https://github.com/chrysa/pre-commit-hooks-changelog
        rev: v0.1.4
        hooks:
            -   id: generate-changelog

    # ── Python tools ───────────────────────────────────────────────────────────
    -   repo: https://github.com/chrysa/pre-commit-tools
        rev: 0.0.60
        hooks:
            -   id: format-dockerfiles
            -   id: python-print-detection
            -   id: python-pprint-detection
            -   id: debugger-detection
            -   id: python-logger-detection
            -   id: yaml-sorter
                exclude: >-
                    (?x)^(
                        changelog/.*\.ya?ml|
                        \.pre-commit-hooks\.yaml|
                        \.pre-commit-config\.yaml
                    )$

    # ── Ruff (remplace black, isort, pyupgrade, flake8, pylint) ───────────────
    -   repo: https://github.com/astral-sh/ruff-pre-commit
        rev: v0.9.6
        hooks:
            -   id: ruff
                args: [--fix]
            -   id: ruff-format

    # ── Setup.cfg ──────────────────────────────────────────────────────────────
    -   repo: https://github.com/asottile/setup-cfg-fmt
        rev: v2.8.0
        hooks:
            -   id: setup-cfg-fmt

    # ── Mypy ───────────────────────────────────────────────────────────────────
    -   repo: https://github.com/pre-commit/mirrors-mypy
        rev: v1.15.0
        hooks:
            -   id: mypy
                additional_dependencies: [ruamel.yaml]

    # ── Docker ─────────────────────────────────────────────────────────────────
    -   repo: https://github.com/IamTheFij/docker-pre-commit
        rev: v3.0.1
        hooks:
            -   id: docker-compose-check

    # ── Markdown ───────────────────────────────────────────────────────────────
    -   repo: https://github.com/igorshubovych/markdownlint-cli
        rev: v0.44.0
        hooks:
            -   id: markdownlint
                args: [--fix]

    # ── Général ────────────────────────────────────────────────────────────────
    -   repo: https://github.com/pre-commit/pre-commit-hooks
        rev: v5.0.0
        hooks:
            -   id: trailing-whitespace
            -   id: end-of-file-fixer
            -   id: check-yaml
                args: [--unsafe]
            -   id: check-toml
            -   id: check-merge-conflict
            -   id: check-added-large-files
            -   id: mixed-line-ending
                args: [--fix=lf]
