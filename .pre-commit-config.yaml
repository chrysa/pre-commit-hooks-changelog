default_language_version:
    python: python3.13
fail_fast: false
minimum_pre_commit_version: 3.7.1

repos:
    # ── Changelog ──────────────────────────────────────────────────────────────
    -   repo: https://github.com/chrysa/pre-commit-hooks-changelog
        rev: v0.1.4
        hooks:
            -   id: generate-changelog

    # ── Python tools ───────────────────────────────────────────────────────────
    -   repo: https://github.com/chrysa/pre-commit-tools
        rev: 0.0.60
        hooks:
            -   id: format-dockerfiles
            -   id: python-print-detection
            -   id: python-pprint-detection
            -   id: debugger-detection
            -   id: python-logger-detection
            -   id: yaml-sorter
                exclude: >-
                    (?x)^(
                        changelog/.*\.ya?ml|
                        \.pre-commit-hooks\.yaml|
                        \.pre-commit-config\.yaml
                    )$

    # ── Python formatting ──────────────────────────────────────────────────────
    -   repo: https://github.com/psf/black
        rev: 25.1.0
        hooks:
            -   id: black
                language_version: python3.13

    -   repo: https://github.com/PyCQA/isort
        rev: 6.0.1
        hooks:
            -   id: isort

    -   repo: https://github.com/asottile/pyupgrade
        rev: v3.19.1
        hooks:
            -   id: pyupgrade
                args: [--py39-plus]

    # ── Setup.cfg ──────────────────────────────────────────────────────────────
    -   repo: https://github.com/asottile/setup-cfg-fmt
        rev: v2.8.0
        hooks:
            -   id: setup-cfg-fmt

    # ── Mypy ───────────────────────────────────────────────────────────────────
    -   repo: https://github.com/pre-commit/mirrors-mypy
        rev: v1.15.0
        hooks:
            -   id: mypy
                additional_dependencies: [ruamel.yaml]

    # ── Docker ─────────────────────────────────────────────────────────────────
    -   repo: https://github.com/IamTheFij/docker-pre-commit
        rev: v3.0.1
        hooks:
            -   id: docker-compose-check

    # ── Markdown ───────────────────────────────────────────────────────────────
    -   repo: https://github.com/igorshubovych/markdownlint-cli
        rev: v0.44.0
        hooks:
            -   id: markdownlint
                args: [--fix]

    # ── Général ────────────────────────────────────────────────────────────────
    -   repo: https://github.com/pre-commit/pre-commit-hooks
        rev: v5.0.0
        hooks:
            -   id: trailing-whitespace
            -   id: end-of-file-fixer
            -   id: check-yaml
                args: [--unsafe]
            -   id: check-toml
            -   id: check-merge-conflict
            -   id: check-added-large-files
            -   id: mixed-line-ending
                args: [--fix=lf]
#    -   repo: https://github.com/timothycrosley/isort
#        rev: 3e09facb2311f5b5b8bff8da90f4992e57f4bc9e
#        hooks:
#            -   id: isort
#                args: ['--settings-path=./setup.cfg']
    -   repo: https://github.com/psf/black
        rev: 'c0a8e4224360a6917dcb5d889b08d5fdcfaf7c2d'
        hooks:
            -   id: black
                args: ['--config=./black.toml']
    -   repo: https://gitlab.com/pycqa/flake8
        rev: '2c64d3ec5ab3ad40dc3e7c10ee0d7fa22f94560d'
        hooks:
            -   id: flake8
                args: ['--config=./setup.cfg']
                stages: ['manual']
    -   repo: https://github.com/pre-commit/mirrors-pylint
        rev: 'v2.6.0'
        hooks:
            -   id: pylint
                args: ['--rcfile=./setup.cfg']
                stages: ['manual']
    -   repo: https://github.com/asottile/dead
        rev: '316a95b4d48d78da77b47bce3b8bf1f269e65c95'
        hooks:
            -   id: dead
                args: ['--files=pre_commit_hook/']
                stages: ['manual']
    -   repo: https://github.com/pre-commit/mirrors-mypy
        rev: 'v0.782'
        hooks:
            -   id: mypy
                args: ['--config-file=./setup.cfg']
                stages: ['manual']
    -   repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
        rev: '0.1.0'
        hooks:
            -   id: yamlfmt
                stages: ['manual']
    -   repo: https://github.com/pre-commit/pre-commit-hooks
        rev: '31d41ff29115a87808277ee0ec23999b17d5b583'
        hooks:
            -   id: check-ast
            -   id: check-case-conflict
            -   id: check-docstring-first
            -   id: debug-statements
            -   id: end-of-file-fixer
            -   id: fix-encoding-pragma
                args: [--remove]
            -   id: mixed-line-ending
                args: [--fix=lf]
            -   id: trailing-whitespace
    -   repo: https://github.com/pre-commit/pre-commit-hooks
        rev: '31d41ff29115a87808277ee0ec23999b17d5b583'
        hooks:
            -   id: check-merge-conflict
