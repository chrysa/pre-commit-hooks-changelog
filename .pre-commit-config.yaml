default_language_version:
  python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0

repos:
  # ── Changelog ──────────────────────────────────────────────────────────────
  # NOTE: chrysa/* repos don't publish semver tags for every feature — use SHA
  - repo: https://github.com/chrysa/pre-commit-hooks-changelog
    rev: 40d13585c4c845c36108a565f00c23f2b946e9d9
    hooks:
      - id: generate-changelog

  # ── Python tools ───────────────────────────────────────────────────────────
  - repo: https://github.com/chrysa/pre-commit-tools
    rev: 4462e85fc30aeec4bddb1728383c504626f1b9d2
    hooks:
      - id: format-dockerfiles
      - id: python-print-detection
      - id: python-pprint-detection
      - id: debugger-detection
      - id: python-logger-detection
      - id: json-sorter
      - id: requirements-sort
      - id: env-file-check
      - id: yaml-sorter
        exclude: >-
          (?x)^(
            changelog/.*\.ya?ml|
            \.pre-commit-hooks\.yaml|
            \.pre-commit-config\.yaml|
            \.github/.*\.ya?ml
          )$

  # ── Ruff (replaces black, isort, pyupgrade, flake8, pylint) ───────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Setup.cfg ──────────────────────────────────────────────────────────────
  - repo: https://github.com/asottile/setup-cfg-fmt
    rev: v3.2.0
    hooks:
      - id: setup-cfg-fmt

  # ── Mypy ───────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies: [ruamel.yaml]

  # ── Docker ─────────────────────────────────────────────────────────────────
  - repo: https://github.com/IamTheFij/docker-pre-commit
    rev: v3.0.1
    hooks:
      - id: docker-compose-check

  # ── Markdown ───────────────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--fix]

  # ── General ────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending
        args: [--fix=lf]
