---
x-app: &default-app
    build: &default-app-build
        context: .
        dockerfile: Dockerfile
        cache_from:
            - &default-app-python-cache python:3.8-alpine
    # Run bind-mount containers as the host user so tool output written into the
    # mounted tree is owned by the developer, never root (chrysa artifact isolation).
    user: "${UID:-1000}:${GID:-1000}"
    # Keep every tool cache out of the mounted source tree and give a writable HOME.
    environment:
        HOME: /tmp
        PYTHONPYCACHEPREFIX: /tmp/.toolcache/pycache
        RUFF_CACHE_DIR: /tmp/.toolcache/ruff
        MYPY_CACHE_DIR: /tmp/.toolcache/mypy
        PYTEST_ADDOPTS: -p no:cacheprovider
        COVERAGE_FILE: /tmp/.coverage
    command: bash
    volumes:
        - &default-app-volume-app ./pre_commit_hook:/src/pre_commit_hook
    working_dir: /src


services:
    documentation:
        <<: *default-app
        image: generate_changelog_documentation:1.0.0
        build:
            <<: *default-app-build
            target: documentation
            cache_from:
                - *default-app-python-cache
                - generate_changelog_documentation:1.0.0
        container_name: documentation_generate_changelog
        volumes:
            - *default-app-volume-app
            - ./docs:/src/docs
    generate_changelog:
        <<: *default-app
        image: generate_changelog:0.2.0
        build:
            <<: *default-app-build
            cache_from:
                - *default-app-python-cache
                - generate_changelog:0.2.0
            target: application
        container_name: generate_changelog
        volumes:
            - *default-app-volume-app
            - ./changelog:/src/changelog
    pytest:
        <<: *default-app
        image: generate_changelog_pytest:1.0.0
        build:
            <<: *default-app-build
            cache_from:
                - *default-app-python-cache
                - generate_changelog_pytest:1.0.0
            target: pytest
        container_name: pytest_generate_changelog
        volumes:
            - *default-app-volume-app
            - ./tests:/src/tests
            # Surface coverage.xml on the host so CI can upload it to SonarCloud.
            - ./coverage.xml:/src/coverage.xml
    quality:
        <<: *default-app
        image: generate_changelog_quality:1.0.0
        build:
            <<: *default-app-build
            cache_from:
                - *default-app-python-cache
                - generate_changelog_quality:1.0.0
            target: pytest
        container_name: quality_generate_changelog
        working_dir: /src
